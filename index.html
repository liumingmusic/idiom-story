<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f5f1" />
  <meta name="description" content="小初成语学习手册：每天一个成语，按主题分层浏览全部成语，可朗读、收藏、标记认识/待学习。含拼音、释义、出处、典故白话故事、例句、近义反义。" />
  <title>成语故事 · 小初成语学习手册</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="assets/css/style.css?v=15" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9C%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- 顶部：标题 + 导航 -->
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <span class="seal" aria-hidden="true">印</span>
        <div class="brand-text">
          <h1 class="site-title">成语故事</h1>
          <p class="site-sub">小初成语学习手册 · 每天一个成语</p>
        </div>
      </div>
      <div class="today-meta">
        <span class="today-badge">今日</span>
        <time id="todayDate" class="today-date"></time>
      </div>
    </div>
    <nav class="topnav wrap" id="topnav" aria-label="主导航">
      <button class="navlink is-active" data-view="home">首页</button>
      <button class="navlink" data-view="handbook">成语手册</button>
      <button class="navlink" data-view="favorites">收藏</button>
      <button class="navlink" data-view="mine">我的学习</button>
      <button class="navlink" data-view="history">历史回看</button>
    </nav>
  </header>

  <!-- 视图容器：由 JS 按导航渲染 -->
  <main class="wrap" id="viewRoot">
    <div class="loading">正在翻开手册……</div>
  </main>

  <!-- 移动端底部 Tab 栏 -->
  <nav class="tabbar" id="tabbar" aria-label="底部导航">
    <button class="tabitem is-active" data-view="home"><span class="ti-ico">🏠</span><span class="ti-lab">首页</span></button>
    <button class="tabitem" data-view="handbook"><span class="ti-ico">📚</span><span class="ti-lab">手册</span></button>
    <button class="tabitem" data-view="favorites"><span class="ti-ico">⭐</span><span class="ti-lab">收藏</span></button>
    <button class="tabitem" data-view="mine"><span class="ti-ico">📖</span><span class="ti-lab">我的</span></button>
  </nav>

  <footer class="site-footer">
    <div class="wrap">
      <p>成语故事 · 纯静态离线手册 · 数据基于开源
        <a href="https://github.com/pwxcoo/chinese-xinhua" target="_blank" rel="noopener">chinese-xinhua</a>
        并人工精选补充白话故事</p>
      <p class="muted">同一天所有人看到同一个「今日成语」，每天自动更新 · 无需联网、无广告、无追踪</p>
    </div>
  </footer>

  <!-- 详情弹层 -->
  <div id="detailModal" class="modal" role="dialog" aria-modal="true" aria-label="成语详情">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-body scroll-deco" id="modalBody"><!-- JS 渲染 --></div>
  </div>

  <!-- 提示 -->
  <div id="toast" class="toast" hidden></div>

  <script src="assets/js/app.js?v=15" defer></script>
</body>
</html>

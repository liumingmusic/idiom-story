<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f1e3" />
  <meta name="description" content="每天一个成语故事，给孩子的传统文化启蒙：拼音、释义、出处、典故白话故事、例句、近义反义，可朗读、收藏、检索。" />
  <title>成语故事 · 每天一个成语</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%9C%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- 顶部 -->
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <span class="seal" aria-hidden="true">印</span>
        <div class="brand-text">
          <h1 class="site-title">成语故事</h1>
          <p class="site-sub">每天一个成语 · 给孩子的传统文化启蒙</p>
        </div>
      </div>
      <div class="today-meta">
        <span class="today-badge">今日成语</span>
        <time id="todayDate" class="today-date"></time>
      </div>
    </div>
  </header>

  <main class="wrap" id="main">
    <!-- 今日成语主卡 -->
    <section id="heroSection" class="hero-section" aria-label="今日成语">
      <article id="heroCard" class="hero-card scroll-deco">
        <!-- JS 渲染 -->
        <div class="loading">正在翻开今天的成语……</div>
      </article>
    </section>

    <!-- 检索工具条 -->
    <section class="toolbar" aria-label="检索与筛选">
      <div class="search-box">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input id="searchInput" type="search" inputmode="search" autocomplete="off"
               placeholder="搜索成语 / 释义 / 故事……" aria-label="搜索成语" />
        <button id="clearSearch" class="clear-btn" aria-label="清除搜索" hidden>✕</button>
      </div>

      <div class="tabs" role="tablist" id="viewTabs">
        <button class="tab is-active" data-view="all" role="tab">全部</button>
        <button class="tab" data-view="fav" role="tab">收藏夹</button>
        <button class="tab" data-view="known" role="tab">认识了</button>
        <button class="tab" data-view="tolearn" role="tab">待学习</button>
        <button class="tab" data-view="history" role="tab">历史回看</button>
      </div>

      <div class="filter-row">
        <div class="filter-group" id="tagFilter" aria-label="按类别筛选">
          <span class="filter-label">类别</span>
          <div class="chips" id="tagChips"></div>
        </div>
        <div class="filter-group" id="alphaFilter" aria-label="按拼音首字母筛选">
          <span class="filter-label">首字母</span>
          <div class="chips alpha" id="alphaChips"></div>
        </div>
      </div>
    </section>

    <!-- 结果区 -->
    <section class="results-section" aria-label="成语列表">
      <div class="results-head">
        <h2 id="resultsTitle" class="results-title">全部成语</h2>
        <span id="resultsCount" class="results-count"></span>
      </div>
      <div id="resultsGrid" class="results-grid"></div>
      <p id="emptyHint" class="empty-hint" hidden>这里还没有成语，换个条件试试吧～</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>成语故事 · 纯静态离线站点 · 数据基于开源
        <a href="https://github.com/pwxcoo/chinese-xinhua" target="_blank" rel="noopener">chinese-xinhua</a>
        并人工精选补充白话故事</p>
      <p class="muted">同一天所有人看到同一个「今日成语」，每天自动更新 · 无需联网、无广告、无追踪</p>
    </div>
  </footer>

  <!-- 详情弹层 -->
  <div id="detailModal" class="modal" hidden role="dialog" aria-modal="true" aria-label="成语详情">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-body scroll-deco" id="modalBody"><!-- JS 渲染 --></div>
  </div>

  <!-- 提示 -->
  <div id="toast" class="toast" hidden></div>

  <script src="assets/js/app.js" defer></script>
</body>
</html>
